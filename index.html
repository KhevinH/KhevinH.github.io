<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <style>
        /* Estilo general del cuerpo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3); /* Fondo con gradiente suave */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Estilo para el formulario */
        form {
            background: #fff;
            border-radius: 12px; /* Bordes redondeados */
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1); /* Sombra para dar profundidad */
            padding: 30px;
            width: 100%;
            max-width: 400px; /* Ancho máximo */
            border: 1px solid #e0e0e0; /* Borde ligero */
            transition: transform 0.3s ease-in-out;
        }

        form:hover {
            transform: scale(1.02); /* Efecto ligero de hover para darle dinamismo */
        }

        /* Estilo para el título */
        h2 {
            text-align: center;
            color: #333;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Estilo para las etiquetas */
        label {
            font-size: 15px;
            color: #444;
            margin-bottom: 8px;
            display: block;
        }

        /* Estilo para los campos de texto */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 8px; /* Bordes redondeados para los inputs */
            box-sizing: border-box;
            font-size: 14px;
            background: #f7f7f7; /* Fondo claro */
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #007bff; /* Cambio de color al enfocarse en los inputs */
            outline: none;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.2); /* Sombra ligera al enfocarse */
        }

        /* Estilo para el botón */
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #007bff, #0056b3); /* Gradiente en el botón */
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #0056b3, #004494); /* Cambio de gradiente en hover */
            box-shadow: 0 8px 16px rgba(0, 123, 255, 0.4); /* Efecto de sombra al pasar el cursor */
        }

        /* Estilo para los mensajes de ayuda o instrucciones */
        .form-help {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="form-container">
        <form action="login.html" method="post">
            <h2>Registro de usuario</h2>
            <label for="username">Usuario:</label>
            <input type="text" name="username" required><br>
            <label for="password">Contraseña:</label>
            <input type="password" name="password" required><br>
            <button type="submit">Registrarse</button>
            <div class="form-help">Todos los campos son obligatorios.</div>
        </form>
    </div>

</body>
</html>
